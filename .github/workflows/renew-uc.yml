name: Katabump UC Renew (SeleniumBase)

# SeleniumBase UC-mode path (weikkadd-style). Kept as alternate to JS CDP path.

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Platform job id (optional for manual test)
        required: false
        type: string
        default: katabump-uc-test
      run_id:
        description: Platform run id (optional for manual test)
        required: false
        type: string
        default: manual-uc-test
      callback_url:
        description: Platform callback URL (optional)
        required: false
        type: string
      use_proxy:
        description: Whether to start sing-box from PROXY_URL
        required: false
        type: boolean
        default: true
      skip_webhook:
        description: Skip platform webhook callback
        required: false
        type: boolean
        default: true

jobs:
  renew-uc:
    name: UC renew
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system + python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
          python -m pip install -U pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: Start Proxy (sing-box)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          USE_PROXY: ${{ github.event.inputs.use_proxy }}
        run: |
          if [ "$USE_PROXY" = "false" ]; then
            echo "use_proxy=false, skipping sing-box setup."
            exit 0
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "PROXY_URL not set, skipping sing-box setup."
            exit 0
          fi
          SINGBOX_VER="1.11.0"
          echo "Downloading sing-box v${SINGBOX_VER}..."
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          echo "Generating sing-box config from PROXY_URL..."
          if ! python proxy_handler.py; then
            echo "::warning::proxy_handler.py failed; continuing WITHOUT proxy."
            exit 0
          fi
          echo "Starting sing-box..."
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 3
          echo "sing-box started."
          head -n 30 singbox.log || true

      - name: Pre-clean chrome leftovers
        run: |
          pkill -9 -f chrome 2>/dev/null || true
          pkill -9 -f chromedriver 2>/dev/null || true
          rm -rf /tmp/chrome_user_data 2>/dev/null || true
          sleep 1

      - name: Run UC renew
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          PROXY_URL: ${{ github.event.inputs.use_proxy == 'true' && secrets.PROXY_URL || '' }}
          KATABUMP_SERVER_ID: ${{ secrets.KATABUMP_SERVER_ID }}
          KATABUMP_SERVER_IDS: ${{ secrets.KATABUMP_SERVER_IDS }}
          KATABUMP_TEST_ONLY_USER: ${{ secrets.KATABUMP_TEST_ONLY_USER }}
          JOB_ID: ${{ github.event.inputs.job_id || 'katabump-uc-test' }}
          RUN_ID: ${{ github.event.inputs.run_id || format('manual-uc-{0}', github.run_id) }}
          CALLBACK_URL: ${{ github.event.inputs.callback_url || 'https://checkin-cron-worker.wwwqqq001.workers.dev/webhook/checkin' }}
          WEBHOOK_TOKEN: ${{ secrets.WEBHOOK_TOKEN }}
          SKIP_WEBHOOK: ${{ github.event.inputs.skip_webhook }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python3 uc_renew.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uc-screenshots
          path: |
            *.png
            screenshots/
          if-no-files-found: warn
